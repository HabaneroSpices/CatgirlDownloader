name: Manual Package Build

on:
  workflow_dispatch:
    inputs:
      build_flatpak:
        description: Build Flatpak bundle too
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - name: Disable man-db trigger
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            wget \
            meson \
            ninja-build \
            pkg-config \
            gettext \
            desktop-file-utils \
            appstream-util \
            appstream \
            libglib2.0-bin \
            libglib2.0-dev-bin \
            libglib2.0-dev \
            libxml2-utils \
            python3 \
            python3-gi \
            python3-requests

          wget https://github.com/goreleaser/nfpm/releases/download/v2.43.2/nfpm_2.43.2_amd64.deb
          sudo apt-get install -y --no-install-recommends ./nfpm_2.43.2_amd64.deb

          wget -O appimagetool.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          sudo mv appimagetool.AppImage /usr/local/bin/appimagetool

      - name: Install Flatpak runtime
        if: ${{ inputs.build_flatpak }}
        run: |
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y org.gnome.Platform/x86_64/49 org.gnome.Sdk/x86_64/49

      - name: Build packages
        run: |
          BUILD_FLATPAK=${{ inputs.build_flatpak && '1' || '0' }} ./package.sh

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: catgirldownloader-packages-${{ github.run_number }}
          path: |
            build/*.deb
            build/*.rpm
            build/*.apk
            build/*.pkg.tar.zst
            build/*.tar.gz
            build/*.AppImage
            build/*.flatpak
          if-no-files-found: error
          retention-days: 14
